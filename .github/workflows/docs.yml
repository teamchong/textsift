name: Deploy Docs

on:
  push:
    branches: [main]
    # Browser bundle (and its WASM/TS sources) feeds the playground
    # via the textsift/browser alias; rebuild docs when those change.
    paths:
      - 'docs-site/**'
      - 'packages/textsift/src/browser/**'
      - 'packages/textsift/src/zig/**'
      - 'packages/textsift/src/c/**'
      - 'packages/textsift/scripts/**'
      - 'packages/textsift/package.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install binaryen (wasm-opt) from upstream release
        # Ubuntu's apt binaryen is too old to parse the SIMD opcodes
        # that Zig 0.16 emits. Pin to a recent upstream tarball that
        # matches the version on developer Macs (homebrew binaryen 128).
        run: |
          set -e
          BINARYEN_VERSION="version_128"
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar -xz -C /tmp
          sudo cp -r /tmp/binaryen-${BINARYEN_VERSION}/bin/* /usr/local/bin/
          sudo cp -r /tmp/binaryen-${BINARYEN_VERSION}/lib/* /usr/local/lib/
          wasm-opt --version

      - name: Install workspace deps
        run: npm install --no-audit --no-fund

      # The docs site aliases `textsift/browser` to
      # packages/textsift/dist/browser/index.js (gitignored). Build it
      # first so astro's vite resolver can find it.
      - name: Build textsift browser bundle
        run: cd packages/textsift && npm run build:browser

      - name: Build docs site
        run: cd docs-site && npx astro build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

      - uses: actions/deploy-pages@v4
