name: release

# Triggered by bumping `packages/textsift/package.json`'s `version`
# field on `main`. Mirrors the turboquant-wasm / vectorjson release
# shape; on push to `main` the OIDC token's `ref` is `refs/heads/main`,
# which is what npm's Trusted Publisher entries expect by default.
# (Tag-based pushes set `ref: refs/tags/...` and would need an
# explicit tag pattern in each Trusted Publisher entry.)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/textsift/package.json"

jobs:
  # ── Read the version from package.json; skip if a matching v* tag ──
  # ── already exists (so re-running on the same version is a no-op). ──
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version + check tag
        id: version
        run: |
          VERSION=$(node -p "require('./packages/textsift/package.json').version")
          TAG="v$VERSION"
          echo "Version: $VERSION, tag: $TAG"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists; skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build per-platform .node binary, upload as job artifact ──
  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            triple: linux-x64
            backend: vulkan
          - os: ubuntu-22.04-arm
            label: linux-arm64
            triple: linux-arm64
            backend: vulkan
          # Both macOS targets build on the same Apple Silicon runner.
          # darwin-x64 is produced via Zig cross-compile (`-target
          # x86_64-macos`); we used to schedule it on `macos-13` (the
          # only x64 Mac runner GitHub still offers in the free pool),
          # but that pool is so capacity-starved that one v0.1.0 attempt
          # sat queued for 24 hours and timed out without picking up a
          # runner. Cross-compile from arm64 sidesteps the queue entirely.
          - os: macos-latest
            label: darwin-arm64
            triple: darwin-arm64
            backend: metal
            zig_target: aarch64-macos
          - os: macos-latest
            label: darwin-x64
            triple: darwin-x64
            backend: metal
            zig_target: x86_64-macos
          - os: windows-latest
            label: windows-x64
            triple: windows-x64
            backend: dawn

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: jdx/mise-action@v2
        with: { experimental: true }

      # Reuse the test workflow's prereq install steps. Keep these in sync
      # with .github/workflows/test.yml's prereq sections.
      - name: Linux prereqs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools libvulkan-dev cmake ninja-build clang
      - name: macOS prereqs
        if: runner.os == 'macOS'
        run: brew install glslang cmake ninja
      - name: Windows prereqs
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install -y cmake ninja

      # Set up MSVC env so Zig finds the Windows SDK system libraries
      # (d3dcompiler.lib, d3d12.lib, dxgi.lib — required by Dawn's
      # static webgpu_dawn.lib). Sets LIB / INCLUDE / PATH for the rest
      # of the job. Runner-only step; no-op on Linux/Mac.
      - name: Setup MSVC env (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Dawn build
        if: matrix.backend == 'dawn'
        id: dawn-cache
        uses: actions/cache@v4
        with:
          path: packages/textsift/vendor/dawn
          key: dawn-${{ runner.os }}-${{ runner.arch }}-2026-04-26

      - name: Build Dawn (cache miss)
        if: matrix.backend == 'dawn' && steps.dawn-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -e
          git clone --depth 1 https://dawn.googlesource.com/dawn /tmp/dawn
          cd /tmp/dawn
          CC=clang CXX=clang++ cmake -B out -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_VISIBILITY_PRESET=hidden \
            -DCMAKE_C_VISIBILITY_PRESET=hidden \
            -DCMAKE_VISIBILITY_INLINES_HIDDEN=ON \
            -DDAWN_FETCH_DEPENDENCIES=ON \
            -DDAWN_BUILD_SAMPLES=OFF \
            -DDAWN_USE_GLFW=OFF -DDAWN_USE_X11=OFF -DDAWN_USE_WAYLAND=OFF \
            -DDAWN_ENABLE_OPENGLES=OFF -DDAWN_ENABLE_DESKTOP_GL=OFF \
            -DDAWN_BUILD_TESTS=OFF -DTINT_BUILD_TESTS=OFF -DTINT_BUILD_CMD_TOOLS=OFF
          ninja -C out -j$(nproc 2>/dev/null || echo 4) webgpu_dawn
          DAWN_VENDOR="$GITHUB_WORKSPACE/packages/textsift/vendor/dawn"
          mkdir -p "$DAWN_VENDOR/include/webgpu" "$DAWN_VENDOR/include/dawn" "$DAWN_VENDOR/lib"
          cp /tmp/dawn/include/webgpu/webgpu.h "$DAWN_VENDOR/include/webgpu/"
          cp /tmp/dawn/out/gen/include/dawn/webgpu.h "$DAWN_VENDOR/include/dawn/"
          # Dawn produces webgpu_dawn.lib on Windows (MSVC ABI),
          # libwebgpu_dawn.a on Linux/clang. Copy whichever exists.
          if [[ -f /tmp/dawn/out/src/dawn/native/webgpu_dawn.lib ]]; then
            cp /tmp/dawn/out/src/dawn/native/webgpu_dawn.lib "$DAWN_VENDOR/lib/"
          elif [[ -f /tmp/dawn/out/src/dawn/native/libwebgpu_dawn.a ]]; then
            cp /tmp/dawn/out/src/dawn/native/libwebgpu_dawn.a "$DAWN_VENDOR/lib/"
          else
            echo "no webgpu_dawn static library produced" >&2
            exit 1
          fi

      - run: npm install --no-audit --no-fund
      - name: Build native (.node)
        env:
          # Empty for native builds; set per-row to cross-compile (only
          # used by the darwin-x64-from-arm64 row today).
          ZIG_TARGET: ${{ matrix.zig_target || '' }}
        run: bash packages/textsift/scripts/build-native.sh

      - name: Upload .node binary
        uses: actions/upload-artifact@v4
        with:
          name: textsift-${{ matrix.triple }}
          path: packages/textsift/dist/textsift-native.node
          retention-days: 7

  # ── Per-triple OIDC publish: one top-level `npm publish --provenance` ──
  # ── per matrix row, mirroring the turboquant-wasm / vectorjson shape. ──
  # ── (Earlier we wrapped this in execSync from a Node script and npm  ──
  # ── rejected with the misleading 404; matching the working sibling   ──
  # ── repos exactly takes that variable off the table.)                ──
  publish-native:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    name: publish ${{ matrix.triple }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance / OIDC trusted publishing
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linux-x64
            os: linux
            cpu: x64
            libc: glibc
          - triple: linux-arm64
            os: linux
            cpu: arm64
            libc: glibc
          - triple: darwin-x64
            os: darwin
            cpu: x64
          - triple: darwin-arm64
            os: darwin
            cpu: arm64
          - triple: windows-x64
            os: win32
            cpu: x64
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download .node artifact
        uses: actions/download-artifact@v4
        with:
          name: textsift-${{ matrix.triple }}
          path: pkg

      - name: Stage package.json
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          TRIPLE: ${{ matrix.triple }}
          OS: ${{ matrix.os }}
          CPU: ${{ matrix.cpu }}
          LIBC: ${{ matrix.libc }}
        run: |
          libc_field=""
          if [[ -n "${LIBC:-}" ]]; then
            libc_field=$',\n  "libc": ["'"$LIBC"'"]'
          fi
          cat > pkg/package.json <<EOF
          {
            "name": "textsift-$TRIPLE",
            "version": "$VERSION",
            "description": "textsift native binding for $TRIPLE",
            "main": "textsift-native.node",
            "files": ["textsift-native.node"],
            "os": ["$OS"],
            "cpu": ["$CPU"]$libc_field,
            "license": "Apache-2.0",
            "repository": { "type": "git", "url": "git+https://github.com/teamchong/textsift.git" }
          }
          EOF

      - name: Publish to npm (OIDC)
        run: cd pkg && npm publish --access public --provenance

  # ── After all 5 natives publish, build the browser bundle and publish ──
  # ── the umbrella with optionalDependencies pinned to matching versions. ──
  publish-umbrella:
    needs: [check-version, publish-native]
    if: needs.check-version.outputs.should_release == 'true'
    name: publish textsift (umbrella)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: jdx/mise-action@v2
        with: { experimental: true }

      - name: Install binaryen (wasm-opt) from upstream release
        # Apt's binaryen is too old to parse the SIMD opcodes Zig 0.16 emits.
        run: |
          set -e
          BINARYEN_VERSION="version_128"
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar -xz -C /tmp
          sudo cp -r /tmp/binaryen-${BINARYEN_VERSION}/bin/* /usr/local/bin/
          sudo cp -r /tmp/binaryen-${BINARYEN_VERSION}/lib/* /usr/local/lib/

      - run: npm install --no-audit --no-fund

      # Build dist/browser/* and dist/index.js / cli.js / sarif.js + types.
      - run: npm run build:browser -w textsift
      - run: cd packages/textsift && bun build src/index.ts --outdir dist --target node --format esm --sourcemap=external && bun build src/cli.ts --outdir dist --target node --format esm --sourcemap=external && bun build src/sarif.ts --outdir dist --target node --format esm --sourcemap=external

      - name: Pin optionalDependencies to matching version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const p = "packages/textsift/package.json";
          const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
          pkg.optionalDependencies = {};
          for (const t of ["linux-x64","linux-arm64","darwin-x64","darwin-arm64","windows-x64"]) {
            pkg.optionalDependencies["textsift-" + t] = process.env.VERSION;
          }
          fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
          NODE

      - name: Publish to npm (OIDC)
        run: cd packages/textsift && npm publish --access public --provenance

  # ── After successful publish, push the v$VERSION tag so the source ──
  # ── of truth in git matches what's on npm. ──
  create-tag:
    needs: [check-version, publish-umbrella]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"
