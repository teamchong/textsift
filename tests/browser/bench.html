<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>textsift — browser perf bench</title>
  </head>
  <body>
    <pre id="out">starting</pre>
    <!-- The umbrella `textsift` package externalizes its deps so a
         consumer's bundler (Vite/Webpack/etc) can resolve them. The
         bench page loads ESM directly with no bundler, so we wire the
         bare-name imports via an import map. -->
    <script type="importmap">
      {
        "imports": {
          "textsift-core": "/packages/textsift-core/dist/index.js",
          "@huggingface/transformers": "https://esm.sh/@huggingface/transformers@4.2.0"
        }
      }
    </script>
    <script type="module">
      // Run all three backends in a real browser and report:
      //   - first-visit cold start (model download dominates the first
      //     backend; subsequent backends benefit from browser HTTP cache
      //     or our OPFS cache, so order matters — we run tjs first to
      //     give it the worst-case position)
      //   - second-visit cold start (caches populated; only parse +
      //     compile + GPU upload remains)
      //   - steady-state inference median across several text lengths
      //
      // Original/baseline = `transformers.js` running the same
      // openai/privacy-filter ONNX. Forced via createWithResolver so the
      // umbrella's auto-WebGPU short-circuit doesn't replace tjs with
      // our WebGPU backend on machines that have one.
      import { PrivacyFilter, TransformersJsBackend } from "/packages/textsift/dist/index.js";

      const FORCE_TJS_RESOLVER = {
        async resolveAuto({ bundle, quantization }) {
          return new TransformersJsBackend({
            bundle,
            quantization,
            device: "auto",
          });
        },
      };
      const createTjs = (opts = {}) =>
        PrivacyFilter.createWithResolver(opts, FORCE_TJS_RESOLVER);

      const $out = document.getElementById("out");
      const log = (m) => { $out.textContent += "\n" + m; };

      const SEEDS = [
        "Hi, my name is John Smith.",
        "Please email me at jane.doe@example.com about invoice 4511 or call (555) 123-4567.",
        "My SSN is 123-45-6789 and my bank account is 9876543210. I live at 456 Oak Avenue, " +
          "Boston, MA 02134. Call me at (617) 555-0199 or text my cell at 617.555.0123.",
      ];
      const WARMUP = 2;
      const ITERS = 5;

      function median(xs) {
        const s = [...xs].sort((a, b) => a - b);
        return s[Math.floor(s.length / 2)];
      }

      async function measure(label, filter, text) {
        for (let i = 0; i < WARMUP; i++) await filter.detect(text);
        const samples = [];
        for (let i = 0; i < ITERS; i++) {
          const t = performance.now();
          await filter.detect(text);
          samples.push(performance.now() - t);
        }
        const med = median(samples);
        log(`  ${label.padEnd(18)} median=${med.toFixed(1)}ms`);
        return med;
      }

      try {
        const hasWebGPU = !!navigator.gpu;
        log(`WebGPU available: ${hasWebGPU}`);

        // Baseline: transformers.js + ORT Web running the same ONNX.
        // Forced via resolver so we measure the original path even on
        // machines with WebGPU (where the umbrella's "auto" would
        // otherwise pick our WebGPU backend).
        log("transformers.js (baseline): create + warmup");
        const t0 = performance.now();
        const tjs = await createTjs({
          onProgress: (ev) => {
            if (ev.stage === "download") {
              const pct = ev.total ? Math.round((ev.loaded / ev.total) * 100) : 0;
              log(`  download ${ev.url.split("/").pop()}: ${pct}%`);
            } else {
              log(`  ${ev.stage}` + (ev.backend ? ` (${ev.backend})` : ""));
            }
          },
        });
        const tjsWarmup = performance.now() - t0;
        log(`transformers.js ready in ${tjsWarmup.toFixed(0)}ms`);

        log("wasm backend: create + warmup");
        const t1 = performance.now();
        const wasm = await PrivacyFilter.create({
          backend: "wasm",
        });
        const wasmWarmup = performance.now() - t1;
        log(`wasm ready in ${wasmWarmup.toFixed(0)}ms`);

        log("webgpu backend: create + warmup");
        const t2 = performance.now();
        const gpu = await PrivacyFilter.create({
          backend: "webgpu",
        });
        const gpuWarmup = performance.now() - t2;
        log(`webgpu ready in ${gpuWarmup.toFixed(0)}ms`);

        const rows = [];
        for (const text of SEEDS) {
          log(`\ntext: "${text.slice(0, 60)}${text.length > 60 ? "…" : ""}"`);
          const tjsMs = await measure("transformers.js", tjs, text);
          const wasmMs = await measure("wasm (core)", wasm, text);
          const gpuMs = await measure("webgpu (core)", gpu, text);
          rows.push({
            text: text.slice(0, 80),
            tjsMs, wasmMs, gpuMs,
            wasmSpeedup: tjsMs / wasmMs,
            gpuSpeedup: tjsMs / gpuMs,
          });
        }

        tjs.dispose();
        wasm.dispose();
        gpu.dispose();

        // Second-visit cold start: dispose + recreate each backend.
        // All persistent caches (tjs's Cache API, our OPFS) should be
        // populated from the first round, so the only cost is parse +
        // pipeline compile + GPU upload (or WASM memory pin).
        log("\nsecond-visit cold start:");
        const tjs2t0 = performance.now();
        const tjs2 = await createTjs({});
        const tjsWarmup2 = performance.now() - tjs2t0;
        log(`  transformers.js: ${tjsWarmup2.toFixed(0)}ms`);

        const wasm2t0 = performance.now();
        const wasm2 = await PrivacyFilter.create({ backend: "wasm" });
        const wasmWarmup2 = performance.now() - wasm2t0;
        log(`  wasm:            ${wasmWarmup2.toFixed(0)}ms`);

        const gpu2t0 = performance.now();
        const gpu2 = await PrivacyFilter.create({ backend: "webgpu" });
        const gpuWarmup2 = performance.now() - gpu2t0;
        log(`  webgpu:          ${gpuWarmup2.toFixed(0)}ms`);

        tjs2.dispose();
        wasm2.dispose();
        gpu2.dispose();

        window.__result = {
          ok: true,
          hasWebGPU,
          tjsWarmupMs: tjsWarmup,
          wasmWarmupMs: wasmWarmup,
          gpuWarmupMs: gpuWarmup,
          tjsWarmup2Ms: tjsWarmup2,
          wasmWarmup2Ms: wasmWarmup2,
          gpuWarmup2Ms: gpuWarmup2,
          rows,
        };
        log("\ndone");
      } catch (e) {
        window.__result = { ok: false, error: String(e), stack: e.stack };
        log("ERROR: " + e);
        throw e;
      }
    </script>
  </body>
</html>
