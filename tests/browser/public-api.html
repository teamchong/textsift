<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>pii-wasm — PrivacyFilter smoke</title>
  </head>
  <body>
    <pre id="out">starting</pre>
    <script type="module">
      // Exercises the public `PrivacyFilter.create({ backend: "wasm" })`
      // path in a real browser — tokenizer + viterbi + chunking + the
      // Stage-1 WASM backend, wired together through the same entry
      // point consumers use. Reads the same ONNX files as transformers.js
      // from `modelSource`.
      import { PrivacyFilter } from "/dist/index.js";

      const $out = document.getElementById("out");
      const log = (msg) => { $out.textContent += "\n" + msg; };

      try {
        log("PrivacyFilter.create (backend=wasm)…");
        const t0 = performance.now();
        const filter = await PrivacyFilter.create({
          backend: "wasm",
        });
        const tCreate = performance.now() - t0;
        log(`created in ${tCreate.toFixed(1)}ms`);

        const text = "Hello world.";
        log(`detect("${text}")`);
        const t1 = performance.now();
        const detectResult = await filter.detect(text);
        const tDetect = performance.now() - t1;

        log(`redact("${text}")`);
        const t2 = performance.now();
        const redactResult = await filter.redact(text);
        const tRedact = performance.now() - t2;

        filter.dispose();

        window.__result = {
          ok: true,
          tCreateMs: tCreate,
          tDetectMs: tDetect,
          tRedactMs: tRedact,
          detect: {
            inputMatches: detectResult.input === text,
            spansIsArray: Array.isArray(detectResult.spans),
            containsPiiType: typeof detectResult.containsPii,
            summaryType: typeof detectResult.summary,
          },
          redact: {
            inputMatches: redactResult.input === text,
            hasRedactedText: typeof redactResult.redactedText === "string",
            spansIsArray: Array.isArray(redactResult.spans),
          },
        };
        log(`done: create=${tCreate.toFixed(1)}ms detect=${tDetect.toFixed(1)}ms redact=${tRedact.toFixed(1)}ms`);
      } catch (e) {
        window.__result = { ok: false, error: String(e), stack: e.stack };
        log("ERROR: " + e);
        throw e;
      }
    </script>
  </body>
</html>
