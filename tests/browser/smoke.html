<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>textsift — browser smoke</title>
  </head>
  <body>
    <pre id="out">starting</pre>
    <script type="module">
      // Cross-backend argmax parity: run the same input through the
      // transformers.js (WebGPU) backend and the Stage-1 Zig+WASM
      // backend, and assert every token's argmax class agrees. Both
      // backends read the same `onnx/model_q4f16.onnx` from HF Hub
      // so any divergence is a kernel bug, not a weight mismatch.
      import { PrivacyFilter } from "/packages/textsift-core/dist/index.js";

      const $out = document.getElementById("out");
      const log = (m) => { $out.textContent += "\n" + m; };

      const TEXT = "Hi, my name is John Smith and my email is john@example.com.";

      try {
        log("create transformers.js backend");
        const tjs = await PrivacyFilter.create({});
        log("create wasm backend");
        const t0 = performance.now();
        const wasm = await PrivacyFilter.create({ backend: "wasm" });
        const tWarmup = performance.now() - t0;
        log(`wasm backend warmup=${tWarmup.toFixed(0)}ms`);

        log(`detect("${TEXT.slice(0, 40)}…")`);
        const t1 = performance.now();
        const [tjsDet, wasmDet] = await Promise.all([tjs.detect(TEXT), wasm.detect(TEXT)]);
        const tForward = performance.now() - t1;

        // Compare span-level output. Both backends should agree on
        // number of spans, span boundaries, and labels. This is a
        // tighter check than raw argmax because it goes through the
        // full Viterbi + BIOES decode — exercises everything the user
        // sees.
        const sameCount = tjsDet.spans.length === wasmDet.spans.length;
        const spanPairs = [];
        const n = Math.min(tjsDet.spans.length, wasmDet.spans.length);
        let agreeAll = sameCount;
        for (let i = 0; i < n; i++) {
          const a = tjsDet.spans[i];
          const b = wasmDet.spans[i];
          const ok = a.start === b.start && a.end === b.end && a.label === b.label;
          if (!ok) agreeAll = false;
          spanPairs.push({ tjs: a, wasm: b, ok });
        }

        tjs.dispose();
        wasm.dispose();

        window.__result = {
          ok: agreeAll,
          text: TEXT,
          tjsSpans: tjsDet.spans,
          wasmSpans: wasmDet.spans,
          sameCount,
          spanPairs,
          tWarmupMs: tWarmup,
          tForwardMs: tForward,
        };
        log(`done: agree=${agreeAll} tjs=${tjsDet.spans.length} wasm=${wasmDet.spans.length}`);
      } catch (e) {
        window.__result = { ok: false, error: String(e), stack: e.stack };
        log("ERROR: " + e);
        throw e;
      }
    </script>
  </body>
</html>
