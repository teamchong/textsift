<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>textsift conformance — shader fixture dump</title>
  </head>
  <body>
    <pre id="out">starting</pre>
    <script type="module">
      // Runs each registered shader via browser WebGPU on a
      // deterministic seeded input, dumps inputs + outputs to
      // window.__fixtures so the Playwright spec can serialize them
      // as binary files. Native conformance tests then load those
      // files and assert byte-equality against `wgpu-native`.
      //
      // Adding a shader = one entry in SHADERS below.

      import { f32_to_f16, pack_f16, unpack_f16, makeRng } from "/tests/conformance/fp16.js";

      async function loadShader(name) {
        const r = await fetch(`/packages/textsift/src/native/shaders/${name}.wgsl`);
        if (!r.ok) throw new Error(`fetch ${name}.wgsl: ${r.status}`);
        return await r.text();
      }

      const $out = document.getElementById("out");
      const log = (m) => { $out.textContent += "\n" + m; };

      // ── helpers used by the shader registry below ──
      function dimsBuf(values) {
        // Pack `values` (each {tag: 'u32'|'f32', value: number}) into a
        // little-endian uniform buffer aligned to 16 bytes.
        const buf = new ArrayBuffer(Math.max(16, ((values.length * 4 + 15) >> 4) << 4));
        const view = new DataView(buf);
        for (let i = 0; i < values.length; i++) {
          if (values[i].tag === "u32") view.setUint32(i * 4, values[i].value, true);
          else view.setFloat32(i * 4, values[i].value, true);
        }
        return new Uint8Array(buf);
      }
      function rngF32(seed, n, scale = 0.5) {
        const rng = makeRng(seed);
        const out = new Float32Array(n);
        for (let i = 0; i < n; i++) out[i] = rng() * scale;
        return out;
      }
      function rngF16(seed, n, scale = 0.5) {
        return new Uint8Array(pack_f16(rngF32(seed, n, scale)).buffer);
      }
      function rngI32Range(seed, n, hi) {
        const rng = makeRng(seed);
        const out = new Int32Array(n);
        for (let i = 0; i < n; i++) out[i] = Math.floor((rng() + 1) * 0.5 * hi) % hi;
        return new Uint8Array(out.buffer);
      }
      function rngU32Range(seed, n, max) {
        const rng = makeRng(seed);
        const out = new Uint32Array(n);
        for (let i = 0; i < n; i++) out[i] = Math.floor((rng() + 1) * 0.5 * max) >>> 0;
        return new Uint8Array(out.buffer);
      }
      // Pack `nibbles` (uint4 values 0..15, length must be multiple of 8)
      // into a u32 array, LSB-first nibble order. Matches the packing
      // every int4 kernel in this codebase reads.
      function packNibbles(nibbles) {
        if ((nibbles.length & 7) !== 0) throw new Error("nibbles must be multiple of 8");
        const words = new Uint32Array(nibbles.length >>> 3);
        for (let i = 0; i < nibbles.length; i++) {
          const w = i >>> 3;
          const slot = i & 7;
          words[w] |= (nibbles[i] & 0xf) << (slot * 4);
        }
        return new Uint8Array(words.buffer);
      }
      // Pack zero-points: per-row, 2 zp nibbles per byte, then bytes
      // stored in a u32 array (loaded by load_byte). zpPerRow bytes
      // per row of N. Returns Uint8Array sized to ceil(N*zpPerRow/4)*4
      // u32 words.
      function packZp(N, n_blocks, seed) {
        const zp_per_row = (n_blocks + 1) >>> 1;
        const total_bytes = N * zp_per_row;
        const u32_count = (total_bytes + 3) >>> 2;
        const words = new Uint32Array(u32_count);
        const rng = makeRng(seed);
        for (let n = 0; n < N; n++) {
          for (let b = 0; b < zp_per_row; b++) {
            const lo = Math.floor((rng() + 1) * 0.5 * 16) & 0xf;
            const hi = Math.floor((rng() + 1) * 0.5 * 16) & 0xf;
            const byte = (lo | (hi << 4)) & 0xff;
            const byteIdx = n * zp_per_row + b;
            const wIdx = byteIdx >>> 2;
            const shift = (byteIdx & 3) * 8;
            words[wIdx] |= byte << shift;
          }
        }
        return new Uint8Array(words.buffer);
      }
      function rngNibbles(seed, n) {
        const rng = makeRng(seed);
        const out = new Uint8Array(n);
        for (let i = 0; i < n; i++) out[i] = Math.floor((rng() + 1) * 0.5 * 16) & 0xf;
        return out;
      }

      // Each entry produces a complete dispatch description: name,
      // uniform buffer, input bindings, output binding, dispatch (x,y,z).
      const SHADERS = [
        // ── element-wise ──
        {
          name: "rms_norm",
          build() {
            const T = 4, D = 128, eps = 1e-6;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:D},{tag:"f32",value:eps},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "x", bytes: rngF16(1, T*D, 0.5) },
                { binding: 2, name: "gamma", bytes: rngF16(2, D, 1.0) },
              ],
              output: { binding: 3, elements: T*D, dtype: "f16" },
              dispatch: [T, 1, 1],
            };
          },
        },
        {
          name: "zero_f32",
          build() {
            const N = 256;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:N},{tag:"u32",value:0},{tag:"u32",value:0},{tag:"u32",value:0}]) },
              inputs: [],
              output: { binding: 1, elements: N, dtype: "u32" },
              // The kernel zeroes the output; harness pre-fills with garbage
              // so we know zeros came from the shader, not from buffer init.
              outputInitial: rngU32Range(99, N, 0xffffff),
              dispatch: [Math.ceil(N / 64), 1, 1],
            };
          },
        },
        {
          name: "cast_fp16_to_f32",
          build() {
            const N = 256;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:N},{tag:"u32",value:0},{tag:"u32",value:0},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "src", bytes: rngF16(3, N, 1.0) },
              ],
              output: { binding: 2, elements: N, dtype: "f32" },
              dispatch: [Math.ceil(N / 64), 1, 1],
            };
          },
        },
        {
          name: "cast_f32_to_fp16_scaled",
          build() {
            const N = 256;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:N},{tag:"u32",value:0},{tag:"u32",value:0},{tag:"u32",value:0}]) },
              extraUniforms: [
                { binding: 1, name: "scale", bytes: dimsBuf([{tag:"f32",value:0.5}]) },
              ],
              inputs: [
                { binding: 2, name: "src", bytes: new Uint8Array(rngF32(4, N, 2.0).buffer) },
              ],
              output: { binding: 3, elements: N, dtype: "f16" },
              dispatch: [Math.ceil(N / 64), 1, 1],
            };
          },
        },
        {
          name: "add_fp16",
          build() {
            const N = 256;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:N},{tag:"u32",value:0},{tag:"u32",value:0},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "a", bytes: rngF16(5, N, 0.5) },
                { binding: 2, name: "b", bytes: rngF16(6, N, 0.5) },
              ],
              output: { binding: 3, elements: N, dtype: "f16" },
              dispatch: [Math.ceil(N / 64), 1, 1],
            };
          },
        },
        {
          name: "swiglu_clamp",
          build() {
            const rows = 4, dff = 128;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:rows},{tag:"u32",value:dff},{tag:"u32",value:0},{tag:"u32",value:0}]) },
              inputs: [
                // gate_up has 2*dff entries per row (gate, up interleaved).
                { binding: 1, name: "gate_up", bytes: new Uint8Array(rngF32(7, rows * 2 * dff, 3.0).buffer) },
              ],
              output: { binding: 2, elements: rows * dff, dtype: "f32" },
              dispatch: [Math.ceil(rows * dff / 64), 1, 1],
            };
          },
        },
        {
          name: "rope_apply",
          build() {
            const T = 4, H = 4, head_dim = 32;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:H},{tag:"u32",value:head_dim},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 2, name: "cos_tab", bytes: rngF16(8, T * head_dim / 2, 1.0) },
                { binding: 3, name: "sin_tab", bytes: rngF16(9, T * head_dim / 2, 1.0) },
              ],
              // qk is read+write, so it lives at the output binding with
              // an initial value uploaded before dispatch.
              output: {
                binding: 1,
                elements: T * H * head_dim,
                dtype: "f16",
              },
              outputInitial: rngF16(10, T * H * head_dim, 1.0),
              dispatch: [Math.ceil(T * H * (head_dim / 2) / 64), 1, 1],
            };
          },
        },
        {
          name: "matmul_int4_fp16_f16",
          build() {
            const T = 4, N = 64, K = 128;
            const n_blocks = K / 32;
            const x = rngF16(20, T * K, 0.5);
            const wNib = rngNibbles(21, N * K);
            const w_int4 = packNibbles(wNib);
            const scales = rngF16(22, N * n_blocks, 1.0);
            const w_zp = packZp(N, n_blocks, 23);
            const bias = rngF16(24, N, 0.1);
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:N},{tag:"u32",value:K},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "x", bytes: x },
                { binding: 2, name: "w_int4", bytes: w_int4 },
                { binding: 3, name: "w_scales", bytes: scales },
                { binding: 4, name: "w_zp", bytes: w_zp },
                { binding: 5, name: "bias", bytes: bias },
              ],
              output: { binding: 6, elements: T * N, dtype: "f16" },
              dispatch: [Math.ceil(N / 64), Math.ceil(T / 4), 1],
            };
          },
        },
        {
          name: "embed_lookup_int4",
          build() {
            const T = 4, V = 32, D = 128;
            const n_blocks = D / 32;
            const ids = new Int32Array(T);
            const idsRng = makeRng(40);
            for (let i = 0; i < T; i++) ids[i] = Math.floor((idsRng() + 1) * 0.5 * V);
            const wNib = rngNibbles(41, V * D);
            const w_int4 = packNibbles(wNib);
            const scales = rngF16(42, V * n_blocks, 1.0);
            const w_zp = packZp(V, n_blocks, 43);
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:V},{tag:"u32",value:D},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "embed_int4", bytes: w_int4 },
                { binding: 2, name: "embed_scales", bytes: scales },
                { binding: 3, name: "embed_zp", bytes: w_zp },
                { binding: 4, name: "ids", bytes: new Uint8Array(ids.buffer) },
              ],
              output: { binding: 5, elements: T * D, dtype: "f16" },
              dispatch: [Math.ceil(T * D / 64), 1, 1],
            };
          },
        },
        {
          name: "add_rmsnorm_fp16_to_f32",
          build() {
            const T = 4, D = 128, eps = 1e-6;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:D},{tag:"f32",value:eps},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "a", bytes: rngF16(50, T*D, 0.5) },
                { binding: 2, name: "b", bytes: rngF16(51, T*D, 0.5) },
                { binding: 3, name: "gamma", bytes: rngF16(52, D, 1.0) },
                // sum_out (binding 4) is a secondary writable output;
                // hand it a zero-filled buffer so the shader can write
                // to it. We don't read it back — primary output is
                // norm_out at binding 5.
                { binding: 4, name: "_sum_out_init", bytes: new Uint8Array(T * D * 2) },
              ],
              output: { binding: 5, elements: T * D, dtype: "f32" },
              dispatch: [T, 1, 1],
            };
          },
        },
        {
          name: "router_topk",
          build() {
            const T = 4, E = 16, K = 4;
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:E},{tag:"u32",value:K},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "logits", bytes: new Uint8Array(rngF32(60, T * E, 2.0).buffer) },
                // out_idx is the secondary output (i32), zero-filled.
                { binding: 2, name: "_out_idx_init", bytes: new Uint8Array(T * K * 4) },
              ],
              output: { binding: 3, elements: T * K, dtype: "f32" },
              dispatch: [Math.ceil(T / 64), 1, 1],
            };
          },
        },
        {
          name: "matmul_int4_f32_f32",
          build() {
            const T = 4, N = 64, K = 128;
            const n_blocks = K / 32;
            const x = new Uint8Array(rngF32(30, T * K, 0.5).buffer);
            const wNib = rngNibbles(31, N * K);
            const w_int4 = packNibbles(wNib);
            const scales = rngF16(32, N * n_blocks, 1.0);
            const w_zp = packZp(N, n_blocks, 33);
            const bias = rngF16(34, N, 0.1);
            return {
              uniform: { binding: 0, bytes: dimsBuf([{tag:"u32",value:T},{tag:"u32",value:N},{tag:"u32",value:K},{tag:"u32",value:0}]) },
              inputs: [
                { binding: 1, name: "x", bytes: x },
                { binding: 2, name: "w_int4", bytes: w_int4 },
                { binding: 3, name: "w_scales", bytes: scales },
                { binding: 4, name: "w_zp", bytes: w_zp },
                { binding: 5, name: "bias", bytes: bias },
              ],
              output: { binding: 6, elements: T * N, dtype: "f32" },
              dispatch: [Math.ceil(N / 64), Math.ceil(T / 4), 1],
            };
          },
        },
      ];

      try {
        if (!navigator.gpu) throw new Error("no navigator.gpu");
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error("no GPU adapter");
        if (!adapter.features.has("shader-f16")) throw new Error("no shader-f16");
        const device = await adapter.requestDevice({ requiredFeatures: ["shader-f16"] });

        const fixtures = {};
        for (const shader of SHADERS) {
          log(`\n[${shader.name}]`);
          const wgsl = await loadShader(shader.name);
          const built = shader.build();
          const elemBytes = built.output.dtype === "f16" ? 2 : 4;
          const outBytes = built.output.elements * elemBytes;
          const extraUniforms = built.extraUniforms ?? [];

          const module = device.createShaderModule({ code: wgsl });
          const pipeline = device.createComputePipeline({
            layout: "auto",
            compute: { module, entryPoint: "main" },
          });

          const uBuf = device.createBuffer({
            size: built.uniform.bytes.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          });
          device.queue.writeBuffer(uBuf, 0, built.uniform.bytes);

          const extraBufs = extraUniforms.map((eu) => {
            const buf = device.createBuffer({
              size: eu.bytes.byteLength,
              usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(buf, 0, eu.bytes);
            return { ...eu, buffer: buf };
          });

          const inBufs = built.inputs.map((entry) => {
            const buf = device.createBuffer({
              size: entry.bytes.byteLength,
              usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(buf, 0, entry.bytes);
            return { ...entry, buffer: buf };
          });

          const outBuf = device.createBuffer({
            size: outBytes,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST,
          });
          if (built.outputInitial) {
            device.queue.writeBuffer(outBuf, 0, built.outputInitial);
          }
          const readback = device.createBuffer({
            size: outBytes,
            usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
          });

          const bgEntries = [
            { binding: built.uniform.binding, resource: { buffer: uBuf } },
            ...extraBufs.map((e) => ({ binding: e.binding, resource: { buffer: e.buffer } })),
            ...inBufs.map((e) => ({ binding: e.binding, resource: { buffer: e.buffer } })),
            { binding: built.output.binding, resource: { buffer: outBuf } },
          ];
          const bg = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: bgEntries,
          });

          const enc = device.createCommandEncoder();
          const pass = enc.beginComputePass();
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bg);
          pass.dispatchWorkgroups(...built.dispatch);
          pass.end();
          enc.copyBufferToBuffer(outBuf, 0, readback, 0, outBytes);
          device.queue.submit([enc.finish()]);
          await readback.mapAsync(GPUMapMode.READ);
          const outBytesView = new Uint8Array(readback.getMappedRange().slice(0));
          readback.unmap();
          log(`  output: ${outBytes} bytes`);

          fixtures[shader.name] = {
            uniform: { binding: built.uniform.binding, bytes: Array.from(built.uniform.bytes) },
            extraUniforms: extraUniforms.map((eu) => ({
              binding: eu.binding,
              name: eu.name,
              bytes: Array.from(eu.bytes),
            })),
            inputs: built.inputs.map((e) => ({
              binding: e.binding,
              name: e.name,
              bytes: Array.from(e.bytes),
            })),
            output: {
              binding: built.output.binding,
              dtype: built.output.dtype,
              bytes: Array.from(outBytesView),
              initial: built.outputInitial ? Array.from(built.outputInitial) : null,
            },
            dispatch: built.dispatch,
          };
        }
        window.__fixtures = fixtures;
        log("\ndone");
      } catch (e) {
        window.__fixtures = { error: String(e), stack: e.stack };
        log("ERROR: " + e);
        throw e;
      }
    </script>
  </body>
</html>
